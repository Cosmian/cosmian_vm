---
# tasks file for ansible/roles/configure_ima

- name: Gathering facts
  ansible.builtin.gather_facts:

- name: Check OS distribution
  ansible.builtin.debug:
    var: ansible_distribution_file_variety

- name: Check grub file path
  ansible.builtin.stat:
    path: /etc/default/grub
  register: configure_ima_etc_default_grub
  tags: update_grub

- name: Configure IMA on Rocky Linux
  when: ansible_distribution_file_variety == 'RedHat'
  tags: ima_rocky
  block:
    - name: Install packages to configure IMA
      ansible.builtin.dnf:
        name:
          - grub2-efi
          - grub2-efi-modules
          - shim
          - policycoreutils
          - policycoreutils-python-utils
          - rpm-plugin-ima
        state: present

    - name: Copy IMA policy
      ansible.builtin.template:
        src: ima-policy-selinux.j2
        dest: /usr/share/ima/policies/03-cosmian-remote-attestation
        owner: root
        group: root
        mode: u=rwX,g=rX,o=rX

    - name: Add SELinux context for IMA policy
      ansible.builtin.shell: |
        set -exo pipefail
        semanage fcontext -a -t usr_t -s system_u /usr/share/ima/policies/03-cosmian-remote-attestation
        restorecon -vF /usr/share/ima/policies/03-cosmian-remote-attestation
      args:
        executable: /bin/bash
      changed_when: true

    - name: Add kernel parameter to re-label the whole system
      ansible.builtin.command:
        cmd: |
          grubby --update-kernel=ALL --args="ima_policy=appraise_tcb ima_appraise=fix"
      changed_when: true

    - name: Update grub
      ansible.builtin.command:
        cmd: |
          grub2-mkconfig -o /boot/grub2/grub.cfg --update-bls-cmdline
      changed_when: true

    - name: Reboot
      ansible.builtin.reboot:
        reboot_command: systemctl reboot
        connect_timeout: 3600
        reboot_timeout: 3600

    - name: Re-label the whole system
      ansible.builtin.command:
        cmd: |
          find / -fstype xfs -type f -uid 0 -exec head -c 0 '{}' \;
      changed_when: true
      ignore_errors: true
      register: configure_ima_errors_register

    - name: Remove kernel parameter to re-label the system
      ansible.builtin.shell: |
        set -exo pipefail
        grubby --update-kernel=ALL --remove-args="ima_policy=appraise_tcb ima_appraise=fix"
        grubby --update-kernel=ALL --args="ima_policy=tcb ima_hash=sha256 ima_template=ima-ng"
      args:
        executable: /bin/bash
      changed_when: true

    - name: Update grub
      ansible.builtin.command:
        cmd: |
          grub2-mkconfig -o /boot/grub2/grub.cfg --update-bls-cmdline
      changed_when: true

    - name: Reboot
      ansible.builtin.reboot:
        reboot_command: systemctl reboot
        connect_timeout: 3600
        reboot_timeout: 3600

    - name: SELinux - allow https
      ansible.builtin.command: setsebool -P httpd_can_network_connect 1
      changed_when: true

    # - name: Setup IMA policy for RHEL
    #   when: ansible_distribution == 'RedHat'
    #   ansible.builtin.shell: |
    #     ima-setup --policy=/usr/share/ima/policies/03-cosmian-remote-attestation
    #   args:
    #     executable: /bin/bash
    #   changed_when: true
    #   ignore_errors: true
    #   become: true
    #   register: configure_ima_errors_register

    - name: Setup IMA policy for Rocky
      ansible.builtin.shell: |
        # extracted from /usr/bin/ima-setup script
        IMA_SYSTEMD_POLICY=/etc/ima/ima-policy
        IMA_POLICY_SYSFS=/sys/kernel/security/ima/policy
        ima_policy_path=/usr/share/ima/policies/03-cosmian-remote-attestation
        if ! test -f "$ima_policy_path"; then
                echo "$ima_policy_path doesn't exist"
                return 1
        fi
        if ! echo "$ima_policy_path" >"$IMA_POLICY_SYSFS"; then
                echo "$ima_policy_path can't be loaded"
                return 1
        fi
        # Let systemd load the IMA policy which will load LSM rules first so IMA
        # policy containing rules like "appraise obj_type=ifconfig_exec_t" can be
        # loaded
        [[ -e /etc/ima ]] || mkdir -p /etc/ima/
        if ! cp --preserve=xattr "$ima_policy_path" "$IMA_SYSTEMD_POLICY"; then
                echo "Failed to copy $ima_policy_path to $IMA_SYSTEMD_POLICY"
                return 1
        fi
      args:
        executable: /bin/bash
      changed_when: true
      become: true

    - name: Reboot
      ansible.builtin.reboot:
        reboot_command: systemctl reboot
        connect_timeout: 3600
        reboot_timeout: 3600

- name: Configure IMA on Ubuntu
  when: ansible_distribution_file_variety == 'Debian'
  tags: ima_ubuntu
  block:
    - name: Create ima folder
      ansible.builtin.file:
        path: /etc/ima
        state: directory
        owner: root
        group: root
        mode: "0500"

    - name: Copy IMA policy
      ansible.builtin.template:
        src: ima-policy.j2
        dest: /etc/ima/ima-policy
        owner: root
        group: root
        mode: u=rwX,g=rX,o=rX


    - name: Copy the bash script to modify grub conf
      when: configure_ima_etc_default_grub.stat.exists
      tags: update_grub
      ansible.builtin.copy:
        content: |
          #!/usr/bin/bash
          f=/etc/default/grub

          # Template policy
          if grep -q ima_policy= $f ; then
            # Template policy already set
            sed -i 's/ima_policy=[^ "]\+/ima_policy=tcb/' $f
          else
            # Template policy not set
            sed -i /GRUB_CMDLINE_LINUX=/s/\"$/\ ima_policy=tcb\"/ $f
          fi

          # Hash method
          if grep -q ima_hash= $f ; then
            echo "Hash method already set"
            sed -i 's/ima_hash=[^ "]\+/ima_hash=sha256/' $f
          else
            echo "Hash method not set"
            sed -i /GRUB_CMDLINE_LINUX=/s/\"$/\ ima_hash=sha256\"/ $f
          fi

          # Template format
          if grep -q ima_template= $f ; then
            echo "Template format already set"
            sed -i 's/ima_template=[^ "]\+/ima_template=ima-ng/' $f
          else
            echo "Template format not set"
            sed -i /GRUB_CMDLINE_LINUX=/s/\"$/\ ima_template=ima-ng\"/ $f
          fi

          # Console ttyS0
          if grep -q console= $f ; then
            echo "console already set"
            sed -i 's/console=[^ "]\+/console=ttyS0/' $f
          else
            echo "console not set"
            sed -i /GRUB_CMDLINE_LINUX=/s/\"$/\ console=ttyS0\"/ $f
          fi

          # earlyprintk
          if grep -q earlyprintk= $f ; then
            echo "earlyprintk already set"
            sed -i 's/earlyprintk=[^ "]\+/earlyprintk=ttyS0/' $f
          else
            echo "earlyprintk not set"
            sed -i /GRUB_CMDLINE_LINUX=/s/\"$/\ earlyprintk=ttyS0\"/ $f
          fi

          sed -i /GRUB_CMDLINE_LINUX=/s/\"$/\ ima_appraise=log\"/ $f
        dest: /tmp/grub.sh
        mode: "0700" # Make the script executable
        remote_src: true

    - name: Run the bash script to modify grub conf
      when: configure_ima_etc_default_grub.stat.exists
      tags: update_grub
      ansible.builtin.command: /tmp/grub.sh
      register: configure_ima_cmd_output
      changed_when: configure_ima_cmd_output.rc != 0

    - name: Remove the bash script to modify grub conf
      when: configure_ima_etc_default_grub.stat.exists
      ansible.builtin.file:
        path: /tmp/grub.sh
        state: absent

    - name: Install package grub2-common
      ansible.builtin.apt:
        name: grub2-common

    - name: Update grub
      ansible.builtin.command: update-grub
      register: configure_ima_cmd_output
      changed_when: configure_ima_cmd_output.rc != 0

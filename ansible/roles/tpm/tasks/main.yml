---
# tasks file for ansible/roles/tpm

- name: TPM packages installation on Ubuntu
  when: ansible_facts['distribution_file_variety'] == 'Debian'
  block:
    - name: Update packages cache
      ansible.builtin.apt:
        update_cache: true

    - name: Install TPM support on Ubuntu
      ansible.builtin.apt:
        name:
          - tpm2-tools
          - tpm2-abrmd
        state: present
        update_cache: true

- name: TPM packages installation on RedHat
  when: ansible_facts['distribution_file_variety'] == 'RedHat'
  block:
    - name: Update packages cache
      ansible.builtin.dnf:
        update_cache: true

    - name: Install TPM support on RedHat
      ansible.builtin.dnf:
        name:
          - tpm2-tools
          - tpm2-abrmd
          - cryptsetup
        state: present
        update_cache: true
